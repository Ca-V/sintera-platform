name: Aplicar migrações Supabase

# Roda automaticamente quando algo em supabase/migrations/ chega no main
# (ex.: após o merge de um PR). Aplica as migrações pendentes ao projeto de
# produção via Supabase CLI. Migrações já registradas são puladas.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  # Permite rodar manualmente pela aba Actions, se necessário.
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: pxiglvrgxooawetboglb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Vincular ao projeto
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Aplicar migrações pendentes
        run: supabase db push
